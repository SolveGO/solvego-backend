name: Branch CI/CD

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
      - 'test/**'
      - 'docs/**'
      - 'ci/**'
      - 'perf/**'
      - 'chore/**'
      - 'infra/**'

concurrency:
  group: solvego-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: solvego_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:mysql://127.0.0.1:3306/solvego_test
      DB_USERNAME: root
      DB_PASSWORD:
      JWT_SECRET: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: branch-jacoco-coverage-report
          path: build/reports/jacoco/test/html

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15

    steps:
      - name: Deploy SolveGO
        run: |
          cd /home/ubuntu/solvego

          git fetch origin main
          git reset --hard origin/main

          docker compose up --build -d

          curl --fail \
            --retry 20 \
            --retry-delay 5 \
            --retry-all-errors \
            http://localhost:8080/actuator/health